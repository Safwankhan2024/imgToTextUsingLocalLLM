{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Local VL Extractor</title>
    <!-- Apply theme before any paint to prevent flash -->
    <script>
        (function() {
            var savedTheme = localStorage.getItem('tuv-theme-preference');
            var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            var t = savedTheme || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t);
            document.documentElement.style.colorScheme = t;
            if (t === 'dark') document.documentElement.classList.add('dark-theme-preload');
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/dark-theme.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.5"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }

        .sortable-ghost { opacity: 0.4; border: 2px dashed #0d6efd; }
        .page-item { cursor: grab; }
        .page-item:active { cursor: grabbing; }

        /* Prevent flash before JS applies the class */
        html.dark-theme-preload body {
            background-color: #0d1117 !important;
            color: #e6edf3 !important;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-white shadow-sm mb-4">
    <div class="container d-flex align-items-center justify-content-between">
        <a class="navbar-brand text-dark fw-bold" href="{% url 'dashboard' %}">📖 VL Extractor</a>
        <button id="theme-toggle-btn"
                class="btn btn-sm btn-outline-secondary"
                type="button"
                title="Switch theme">
            ☀️ Light
        </button>
    </div>
</nav>

<script src="{% static 'js/theme-manager.js' %}"></script>

<div class="container mb-5">
    {% block content %}{% endblock %}
</div>

<script>
    document.body.addEventListener('htmx:configRequest', (event) => {
        event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
</script>
</body>
</html>
